services:
  postgres:
    image: postgres:16-alpine
    container_name: birgap-postgres
    environment:
      POSTGRES_USER: birgap
      POSTGRES_PASSWORD: birgap
      POSTGRES_DB: birgap
    ports:
      - "5432:5432"
    volumes:
      - birgap-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U birgap -d birgap"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: birgap-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - birgap-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  birgap-postgres-data:
  birgap-redis-data:
